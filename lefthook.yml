commit-msg:
  commands:
    commitlint:
      run: pnpm dlx commitlint --edit $1

pre-commit:
  commands:
    biome-check:
      run: pnpm check {staged_files}
      stage_fixed: true
      exclude:
        - "*.{yml,yaml,md,toml,sql,html,png}"
        - ".gitignore"
        - "**/.env.*"
